<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chronology — To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --text: #eceae5; --muted: #454240; --muted2: #7a7570; --muted3: #555250;
    --border: #1c1c1c; --border2: #252525;
    --accent: #818CF8; --accent-dim: rgba(129,140,248,0.08); --accent-border: rgba(129,140,248,0.22);
    --green: #4caf7a; --green-dim: rgba(76,175,122,0.09); --green-border: rgba(76,175,122,0.20);
    --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.09); --amber-border: rgba(245,158,11,0.22);
    --cyan: #22d3ee;  --cyan-dim: rgba(34,211,238,0.07);  --cyan-border: rgba(34,211,238,0.20);
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh; padding: 56px 24px 96px;
  }
  .page { max-width: 720px; margin: 0 auto; }

  /* ── Header ── */
  .hdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 48px; flex-wrap: wrap; }
  .hdr-left .eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted3); margin-bottom: 10px; }
  .hdr-left h1 { font-family: 'Lora', serif; font-size: 38px; font-weight: 700; color: var(--text); letter-spacing: -1px; line-height: 1.1; }
  .hdr-left .sub { font-size: 13px; color: var(--muted3); margin-top: 7px; }
  .pdf-btn {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    background: none; border: none; cursor: pointer; flex-shrink: 0; padding-top: 4px;
    font-family: 'Source Sans 3', sans-serif; -webkit-tap-highlight-color: transparent;
  }
  .pdf-btn-label { font-size: 13px; font-weight: 600; color: var(--muted3); transition: color 0.15s; display: flex; align-items: center; gap: 6px; }
  .pdf-btn-hint  { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; text-align: right; }
  .pdf-btn:hover .pdf-btn-label { color: var(--text); }

  /* ── Progress ── */
  .prog-wrap { margin-bottom: 36px; }
  .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted3); margin-bottom: 8px; }
  .prog-track { height: 2px; background: var(--border2); border-radius: 99px; overflow: hidden; position: relative; }
  .prog-fill-wrap { display: flex; height: 100%; position: absolute; inset: 0; }
  .prog-fill-done { height: 100%; background: var(--green); transition: width 0.4s ease; }
  .prog-fill-half { height: 100%; background: var(--cyan); opacity: 0.5; transition: width 0.4s ease; }

  /* ── Legend ── */
  .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 52px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted3); }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .leg-dot.done { background: var(--green); }
  .leg-dot.half { background: var(--cyan); }
  .leg-dot.demo { background: var(--amber); }
  .leg-dot.todo { background: transparent; border: 1.5px solid var(--border2); }

  /* ── Sections ── */
  .section { margin-bottom: 52px; }
  .section-hdr {
    display: flex; align-items: baseline; gap: 14px;
    border-top: 1px solid var(--border2); padding-top: 22px; margin-bottom: 4px;
  }
  .section-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 700; color: var(--text); flex: 1; line-height: 1.2; }
  .section-count { font-size: 12px; color: var(--muted3); white-space: nowrap; }

  /* ── Items ── */
  .item-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: opacity 0.12s;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .item-row:hover { opacity: 0.75; }

  /* ── Checkboxes ── */
  .chk {
    width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    border: 1.5px solid var(--border2); transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .chk.done { background: var(--green-dim); border-color: var(--green-border); }
  .chk.done::after { content:''; display:block; width:4px; height:7px; border-right:1.5px solid var(--green); border-bottom:1.5px solid var(--green); transform:rotate(45deg) translate(-1px,-1px); }
  .chk.half { background: var(--cyan-dim); border-color: var(--cyan-border); }
  .chk.half::after { content:''; display:block; width:7px; height:1.5px; background:var(--cyan); border-radius:1px; }
  .chk.demo { background: var(--amber-dim); border-color: var(--amber-border); }
  .chk.demo::after { content:'◈'; font-size:8px; color:var(--amber); line-height:1; }

  /* ── Item text ── */
  .item-main { flex: 1; min-width: 0; }
  .item-text { font-size: 14px; font-weight: 500; line-height: 1.5; color: var(--text); }
  .item-text.done { text-decoration: line-through; text-decoration-color: var(--border2); color: var(--muted); font-weight: 400; }
  .item-text.half { color: var(--muted2); }
  .item-text.demo { color: var(--muted); }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; font-size: 9.5px; font-weight: 600; letter-spacing: 0.6px; padding: 1px 5px; border-radius: 20px; margin-left: 6px; text-transform: uppercase; vertical-align: middle; }
  .badge.done-b   { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
  .badge.half-b   { background: var(--cyan-dim);  color: var(--cyan);  border: 1px solid var(--cyan-border); }
  .badge.demo-b   { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge.future-b { background: var(--accent-dim);color: var(--accent);border: 1px solid var(--accent-border); }

  /* ── Note button (pencil, appears on hover) ── */
  .note-btn {
    flex-shrink: 0; color: transparent; background: none; border: none;
    padding: 3px 4px; cursor: pointer; margin-top: 1px;
    transition: color 0.12s; -webkit-tap-highlight-color: transparent;
  }
  .item-row:hover .note-btn,
  .note-btn.has-note { color: var(--muted3); }
  .note-btn:hover    { color: var(--accent) !important; }

  /* ── Delete button for custom items ── */
  .del-btn {
    flex-shrink: 0; color: transparent; background: none; border: none;
    padding: 2px 5px; cursor: pointer; font-size: 14px; line-height: 1;
    transition: color 0.12s; -webkit-tap-highlight-color: transparent; margin-top: 1px;
  }
  .item-row:hover .del-btn { color: var(--muted3); }
  .del-btn:hover            { color: #e05c4b !important; }

  /* ── Extra content area (notes, subs) — indented under item ── */
  .item-extra { padding-left: 29px; }

  /* ── Notes: plain text display, click to edit ── */
  .note-display {
    display: none; font-size: 13px; line-height: 1.6; color: var(--muted3);
    padding: 5px 0 7px; cursor: text;
  }
  .note-display.visible { display: block; }
  .note-display:hover   { color: var(--muted2); }

  .note-edit {
    display: none; width: 100%; min-height: 44px;
    background: transparent; border: none;
    border-bottom: 1px solid var(--border2);
    color: var(--muted2); padding: 5px 0 7px;
    font-family: 'Source Sans 3', sans-serif; font-size: 13px; line-height: 1.6;
    resize: none; outline: none; transition: border-color 0.15s, color 0.15s;
    overflow: hidden;
  }
  .note-edit:focus { border-bottom-color: var(--accent-border); color: var(--text); }
  .note-edit.active { display: block; }

  /* ── Sub-items ── */
  .sub-list { padding: 4px 0 4px; }
  .sub-row { display: flex; gap: 8px; padding: 2px 0; font-size: 12px; color: var(--muted3); line-height: 1.4; }
  .sub-row.done { text-decoration: line-through; text-decoration-color: var(--border); color: var(--muted); }
  .sub-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); flex-shrink: 0; margin-top: 7px; }

  /* ── Add item ── */
  .add-row { padding: 10px 0; display: flex; align-items: center; }
  .add-btn {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--muted); background: none; border: none;
    cursor: pointer; font-family: 'Source Sans 3', sans-serif; padding: 0;
    transition: color 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .add-btn:hover { color: var(--accent); }
  .add-input-wrap { display: none; width: 100%; align-items: center; gap: 12px; }
  .add-input-wrap.active { display: flex; }
  .add-input-wrap .chk { border-color: var(--border2); cursor: default; flex-shrink: 0; }
  .add-input {
    flex: 1; background: transparent; border: none;
    border-bottom: 1px solid var(--accent-border);
    color: var(--text); font-family: 'Source Sans 3', sans-serif;
    font-size: 14px; font-weight: 500; padding: 4px 0; outline: none;
  }
  .add-input::placeholder { color: var(--muted); font-weight: 400; }
  .add-save-btn {
    font-size: 11px; color: var(--accent); background: none; border: none;
    cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-weight: 600; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .add-cancel-btn {
    font-size: 11px; color: var(--muted3); background: none; border: none;
    cursor: pointer; font-family: 'Source Sans 3', sans-serif; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Print ── */
  @media print {
    body { background: #fff !important; color: #111 !important; padding: 24px !important; }
    :root {
      --text:#111; --muted:#aaa; --muted2:#777; --muted3:#999;
      --border:#e8e8e8; --border2:#d0d0d0;
      --bg:#fff; --accent:#4a47c4;
      --green:#2e7d32; --green-dim:transparent; --green-border:#81c784;
      --amber:#b45309; --amber-dim:transparent; --amber-border:#ffc107;
      --cyan:#0891b2; --cyan-dim:transparent; --cyan-border:#4dd0e1;
    }
    .pdf-btn, .note-btn, .del-btn, .add-row { display: none !important; }
    .note-display { display: block !important; color: #777 !important; }
    .note-edit    { display: none !important; }
    .item-text.done { color: #bbb !important; }
    .item-text.demo { color: #aaa !important; }
    .item-row:hover { opacity: 1 !important; }
    .section { break-inside: avoid; }
    .item-row { break-inside: avoid; }
    .section-title { color: #111 !important; }
    .prog-fill-done { background: #555 !important; }
    .prog-fill-half { background: #aaa !important; }
    .legend { display: none !important; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-left">
      <div class="eyebrow">Git Gud</div>
      <h1>Chronology</h1>
      <div class="sub">Launch to-do — updated April 2026</div>
    </div>
    <button class="pdf-btn" onclick="window.print()">
      <div class="pdf-btn-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Save as PDF
      </div>
      <div class="pdf-btn-hint">select "Save as PDF" in the dialog</div>
    </button>
  </div>

  <div class="prog-wrap">
    <div class="prog-label"><span>Progress</span><span id="prog-text">— / —</span></div>
    <div class="prog-track">
      <div class="prog-fill-wrap">
        <div class="prog-fill-done" id="prog-fill-done" style="width:0%"></div>
        <div class="prog-fill-half" id="prog-fill-half" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot done"></div>Done &amp; shipped</div>
    <div class="leg"><div class="leg-dot half"></div>In progress</div>
    <div class="leg"><div class="leg-dot demo"></div>Demo built, not in main</div>
    <div class="leg"><div class="leg-dot todo"></div>Not started</div>

  <div id="lists"></div>

  <footer style="margin-top:56px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;letter-spacing:1.5px;">
    a <span style="color:var(--accent)">git gud</span> game &nbsp;·&nbsp; chronology
  </footer>
</div>

    { id:'snd1', text:'Category sounds — distinct audio cue per category on card load', state:'todo', note:'9 categories, 9 distinct sounds. Plays when a new card loads after placement.',
      subs:['Ancient India — sitar sting or veena','Medieval India — tabla hit or dhol','Colonial India — brass / military snare','Post-Independence — modern synth pop or news jingle','World History — orchestral swell','Science & Tech — digital blip or launch sound','Personalities — spotlight fanfare','Social Reform — crowd murmur or bell','Constitutional — gavel strike'] },

  ]},

/* ── Storage ── */
const LS_KEY = 'chronology-todo-v1';
function load() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; } }
function save(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e) {} }
let S = load();

function getState(id, def) { return (S[id] && S[id].state) ? S[id].state : def; }
function getNote(id, def)  { return (S[id] && S[id].note !== undefined) ? S[id].note : (def || ''); }

/* Custom items */
function getCustomItems(secId) { return (S._custom && S._custom[secId]) ? S._custom[secId] : []; }
function saveCustomItem(secId, item) {
  if (!S._custom) S._custom = {};
  if (!S._custom[secId]) S._custom[secId] = [];
  S._custom[secId].push(item); save(S);
}
function deleteCustomItem(secId, itemId) {
  if (!S._custom || !S._custom[secId]) return;
  S._custom[secId] = S._custom[secId].filter(i => i.id !== itemId);
  delete S[itemId]; save(S); render();
}

/* State cycle: default → half → done → default */
function toggleItem(id, def) {
  const cur = getState(id, def);
  if (!S[id]) S[id] = {};
  if (cur === def)         S[id].state = 'half';
  else if (cur === 'half') S[id].state = 'done';
  else                     S[id].state = def;
  save(S); render();
}

/* Note: click-to-edit */
function startEditNote(id) {
  const disp = document.getElementById('nd-' + id);
  const edit = document.getElementById('ne-' + id);
  if (!edit) return;
  if (disp) disp.classList.remove('visible');
  edit.classList.add('active');
  edit.focus();
  edit.selectionStart = edit.selectionEnd = edit.value.length;
}

function finishEditNote(id) {
  const edit = document.getElementById('ne-' + id);
  if (!edit) return;
  const val = edit.value;
  if (!S[id]) S[id] = {};
  S[id].note = val; save(S);
  const disp = document.getElementById('nd-' + id);
  const btn  = document.getElementById('nb-' + id);
  edit.classList.remove('active');
  if (disp) {
    disp.textContent = val;
    disp.classList.toggle('visible', val.trim().length > 0);
  }
  if (btn) btn.classList.toggle('has-note', val.trim().length > 0);
}

function openNoteEdit(id) {
  const edit = document.getElementById('ne-' + id);
  if (!edit) return;
  if (edit.classList.contains('active')) { finishEditNote(id); return; }
  startEditNote(id);
}

/* Add item */
function showAddInput(secId) {
  const btn = document.getElementById('add-btn-' + secId);
  const inp = document.getElementById('add-inp-' + secId);
  if (btn) btn.style.display = 'none';
  if (inp) { inp.classList.add('active'); }
  const f = document.getElementById('add-field-' + secId);
  if (f) f.focus();
}
function hideAddInput(secId) {
  const btn = document.getElementById('add-btn-' + secId);
  const inp = document.getElementById('add-inp-' + secId);
  const f   = document.getElementById('add-field-' + secId);
  if (btn) btn.style.display = '';
  if (inp) inp.classList.remove('active');
  if (f)   f.value = '';
}
function commitAdd(secId) {
  const f    = document.getElementById('add-field-' + secId);
  const text = f ? f.value.trim() : '';
  if (!text) { hideAddInput(secId); return; }
  const id = 'c_' + Date.now();
  saveCustomItem(secId, { id, text, state: 'todo', note: '' });
  render();
}
function handleAddKey(e, secId) {
  if (e.key === 'Enter')  { e.preventDefault(); commitAdd(secId); }
  if (e.key === 'Escape') { hideAddInput(secId); }
}

/* Progress */
function updateProgress() {
  const allItems = SECTIONS.flatMap(s => [...s.items, ...getCustomItems(s.id)]);
  const total = allItems.length;
  const done  = allItems.filter(i => getState(i.id, i.state) === 'done').length;
  const half  = allItems.filter(i => getState(i.id, i.state) === 'half').length;
  const pctDone = total ? (done / total * 100).toFixed(1) : 0;
  const pctHalf = total ? (half / total * 100 / 2).toFixed(1) : 0;
  document.getElementById('prog-text').textContent =
    done + ' done' + (half ? ' · ' + half + ' in progress' : '') + ' / ' + total;
  document.getElementById('prog-fill-done').style.width = pctDone + '%';
  document.getElementById('prog-fill-half').style.width = pctHalf + '%';
  SECTIONS.forEach(sec => {
    const el = document.getElementById('sc-' + sec.id); if (!el) return;
    const all = [...sec.items, ...getCustomItems(sec.id)];
    const d   = all.filter(i => getState(i.id, i.state) === 'done').length;
    const h   = all.filter(i => getState(i.id, i.state) === 'half').length;
    el.textContent = d + ' / ' + all.length + (h ? ' · ' + h + ' partial' : '');
  });
}

/* Badge */
function mkBadge(type, label) {
  const cls = { done:'done-b', half:'half-b', demo:'demo-b', future:'future-b' }[type] || '';
  return '<span class="badge ' + cls + '">' + label + '</span>';
}

/* Build item element */
function buildItem(item, isCustom, secId) {
  const st      = getState(item.id, item.state);
  const note    = getNote(item.id, item.note);
  const isDone  = st === 'done';
  const isHalf  = st === 'half';
  const isDemo  = !isDone && !isHalf && item.state === 'demo';
  const hasNote = note.trim().length > 0;

  const chkCls = isDone ? 'chk done' : isHalf ? 'chk half' : isDemo ? 'chk demo' : 'chk';
  const txtCls = isDone ? 'item-text done' : isHalf ? 'item-text half' : isDemo ? 'item-text demo' : 'item-text';

  let autoBadge = '';
  if (item.badge === 'future') autoBadge = mkBadge('future', 'post-launch');
  else if (isDone)             autoBadge = mkBadge('done', 'done');
  else if (isHalf)             autoBadge = mkBadge('half', 'in progress');
  else if (isDemo)             autoBadge = mkBadge('demo', 'demo');

  const pencilSVG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>';

  const delBtn = isCustom
    ? ' <button class="del-btn" title="Delete" onclick="event.stopPropagation();deleteCustomItem(\'' + secId + '\',\'' + item.id + '\')">×</button>'
    : '';

  let subsHTML = '';
  if (item.subs && item.subs.length) {
    subsHTML = '<div class="sub-list">' +
      item.subs.map(s =>
        '<div class="sub-row' + (isDone ? ' done' : '') + '"><div class="sub-dot"></div><span>' + s + '</span></div>'
      ).join('') + '</div>';
  }

  const el = document.createElement('div');
  el.className = 'item';
  el.innerHTML =
    '<div class="item-row" onclick="toggleItem(\'' + item.id + '\',\'' + item.state + '\')">'
    + '<div class="' + chkCls + '"></div>'
    + '<div class="item-main"><div class="' + txtCls + '">' + item.text + autoBadge + '</div></div>'
    + '<button class="note-btn' + (hasNote ? ' has-note' : '') + '" id="nb-' + item.id + '" title="Note" onclick="event.stopPropagation();openNoteEdit(\'' + item.id + '\')">' + pencilSVG + '</button>'
    + delBtn
    + '</div>'
    + '<div class="item-extra">'
    + subsHTML
    + '<p class="note-display' + (hasNote ? ' visible' : '') + '" id="nd-' + item.id + '" onclick="startEditNote(\'' + item.id + '\')">' + note + '</p>'
    + '<textarea class="note-edit" id="ne-' + item.id + '" placeholder="Add a note…" onblur="finishEditNote(\'' + item.id + '\')" oninput="this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">' + note + '</textarea>'
    + '</div>';

  return el;
}

/* Render */
function render() {
  const wrap = document.getElementById('lists');
  wrap.innerHTML = '';

  SECTIONS.forEach(sec => {
    const custom   = getCustomItems(sec.id);
    const allItems = [...sec.items, ...custom];

    const sdiv = document.createElement('div');
    sdiv.className = 'section';

    const d = allItems.filter(i => getState(i.id, i.state) === 'done').length;
    const h = allItems.filter(i => getState(i.id, i.state) === 'half').length;
    let countText = d + ' / ' + allItems.length + (h ? ' · ' + h + ' partial' : '');

    sdiv.innerHTML =
      '<div class="section-hdr">'
      + '<div class="section-title">' + sec.title + '</div>'
      + '<div class="section-count" id="sc-' + sec.id + '">' + countText + '</div>'
      + '</div>';

    sec.items.forEach(item => sdiv.appendChild(buildItem(item, false, sec.id)));
    custom.forEach(item    => sdiv.appendChild(buildItem(item, true,  sec.id)));

    // Add item row
    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    addRow.innerHTML =
      '<button class="add-btn" id="add-btn-' + sec.id + '" onclick="showAddInput(\'' + sec.id + '\')">'
      + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
      + ' add item</button>'
      + '<div class="add-input-wrap" id="add-inp-' + sec.id + '">'
      + '<div class="chk"></div>'
      + '<input class="add-input" id="add-field-' + sec.id + '" type="text" placeholder="New item…" onkeydown="handleAddKey(event,\'' + sec.id + '\')">'
      + '<button class="add-save-btn" onclick="commitAdd(\'' + sec.id + '\')">save</button>'
      + '<button class="add-cancel-btn" onclick="hideAddInput(\'' + sec.id + '\')">cancel</button>'
      + '</div>';
    sdiv.appendChild(addRow);

    wrap.appendChild(sdiv);
  });

  updateProgress();
}

render();
</script>
</body>
</html>
